<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Fahri</title>

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: #000814;
}

/* PARTICLE ANIMASI */
body::before, body::after {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: #00aaff;
  border-radius: 50%;
  filter: blur(150px);
  opacity: 0.3;
  animation: move 10s infinite alternate;
}

body::after {
  background: #0077ff;
  top: 50%;
  left: 60%;
  animation-delay: 3s;
}

@keyframes move {
  from { transform: translate(-100px, -100px); }
  to { transform: translate(100px, 100px); }
}

/* BOX LOGIN */
.login-box {
  position: relative;
  z-index: 1;
  width: 320px;
  padding: 35px;
  border-radius: 20px;
  text-align: center;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 30px #00aaff;
}

/* JUDUL */
h1 {
  color: #00aaff;
  margin-bottom: 5px;
}

h2 {
  font-size: 14px;
  color: #ccc;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(0,0,0,0.5);
  color: white;
  box-shadow: 0 0 10px #00aaff inset;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #00aaff, #0077ff);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00aaff;
}

/* ERROR */
.error {
  color: red;
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box">
  <h1>LOGIN</h1>
  <h2>Selamat Datang di Web Fahri 👋</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">MASUK</button>

  <div class="error" id="error">Username atau Password salah!</div>
</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "fahri" && pass === "20090609") {
    localStorage.setItem("login", "true");
    window.location.href = "home.html";
  } else {
    document.getElementById("error").style.display = "block";
  }
}
</script>

</body>
</html>
